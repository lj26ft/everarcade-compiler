[[rustrig]]
name = "resource.harvest"
version = 1
state_domains = ["resource"]
mutation_authority = "declared-rustrig"
mutation_changes = "canonical resource.harvest state transition"

[[rustrig.invariants.rule]]
id = "INV-001"
name = "Declared Mutation Safety"
category = "Safety"
description = """
resource.harvest must reject invalid preconditions before mutating canonical state.
"""
severity = "High"
proof_status = "Unverified"

[[rustrig.invariants.rule]]
id = "INV-002"
name = "State Integrity"
category = "Integrity"
description = """
resource.harvest must preserve unrelated state domains.
"""
severity = "Medium"
proof_status = "Unverified"

[[rustrig.invariants.rule]]
id = "INV-003"
name = "Continuity Trace"
category = "Continuity"
description = """
resource.harvest must emit replay-stable evidence for verifier review.
"""
severity = "Medium"
proof_status = "Unverified"

