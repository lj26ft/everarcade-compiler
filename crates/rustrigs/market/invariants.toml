[[rustrig]]
name = "market.trade"
version = 1
state_domains = ["market"]
mutation_authority = "declared-rustrig"
mutation_changes = "canonical market.trade state transition"

[[rustrig.invariants.rule]]
id = "INV-001"
name = "Asset Conservation"
category = "Conservation"
description = """
Trades cannot create or destroy escrowed assets.
"""
severity = "Critical"
proof_status = "Property-Tested"

[[rustrig.invariants.rule]]
id = "INV-002"
name = "Price Integrity"
category = "Economic"
description = """
Settlement must match the accepted price and quantity.
"""
severity = "Critical"
proof_status = "Property-Tested"

[[rustrig.invariants.rule]]
id = "INV-003"
name = "Counterparty Authorization"
category = "Authorization"
description = """
Only authorized counterparties may settle the trade.
"""
severity = "High"
proof_status = "Property-Tested"

