[[rustrig]]
name = "identity.join"
version = 1
state_domains = ["identity", "ownership"]
mutation_authority = "declared-rustrig"
mutation_changes = "canonical identity.join state transition"

[[rustrig.invariants.rule]]
id = "INV-001"
name = "Declared Mutation Safety"
category = "Safety"
description = """
identity.join must reject invalid preconditions before mutating canonical state.
"""
severity = "High"
proof_status = "Unverified"

[[rustrig.invariants.rule]]
id = "INV-002"
name = "State Integrity"
category = "Integrity"
description = """
identity.join must preserve unrelated state domains.
"""
severity = "Medium"
proof_status = "Unverified"

[[rustrig.invariants.rule]]
id = "INV-003"
name = "Continuity Trace"
category = "Continuity"
description = """
identity.join must emit replay-stable evidence for verifier review.
"""
severity = "Medium"
proof_status = "Unverified"

