[[rustrig]]
name = "operation.migrate"
version = 1
state_domains = ["operation", "continuity"]
mutation_authority = "declared-rustrig"
mutation_changes = "canonical operation.migrate state transition"

[[rustrig.invariants.rule]]
id = "INV-001"
name = "Declared Mutation Safety"
category = "Safety"
description = """
operation.migrate must reject invalid preconditions before mutating canonical state.
"""
severity = "High"
proof_status = "Unverified"

[[rustrig.invariants.rule]]
id = "INV-002"
name = "State Integrity"
category = "Integrity"
description = """
operation.migrate must preserve unrelated state domains.
"""
severity = "Medium"
proof_status = "Unverified"

[[rustrig.invariants.rule]]
id = "INV-003"
name = "Continuity Trace"
category = "Continuity"
description = """
operation.migrate must emit replay-stable evidence for verifier review.
"""
severity = "Medium"
proof_status = "Unverified"

