[[rustrig]]
name = "faction.create"
version = 1
state_domains = ["faction", "ownership"]
mutation_authority = "declared-rustrig"
mutation_changes = "canonical faction.create state transition"

[[rustrig.invariants.rule]]
id = "INV-001"
name = "Declared Mutation Safety"
category = "Safety"
description = """
faction.create must reject invalid preconditions before mutating canonical state.
"""
severity = "High"
proof_status = "Unverified"

[[rustrig.invariants.rule]]
id = "INV-002"
name = "State Integrity"
category = "Integrity"
description = """
faction.create must preserve unrelated state domains.
"""
severity = "Medium"
proof_status = "Unverified"

[[rustrig.invariants.rule]]
id = "INV-003"
name = "Continuity Trace"
category = "Continuity"
description = """
faction.create must emit replay-stable evidence for verifier review.
"""
severity = "Medium"
proof_status = "Unverified"

