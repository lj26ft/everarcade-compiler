[manifest]
name = "arena-vanguard-multinode-federation-load"
version = "0.1.0-launch-candidate"
created_at = "2026-05-31T00:00:00Z"
reproducible = true

[federation]
world_id = "arena-vanguard"
transport = "tcp"
required_nodes = 4
quorum = 3
join = "validated"
checkpoint_sync = "validated"
replay_sync = "validated"
recovery = "validated"

[load]
messages_per_node = 32
max_messages_per_node = 64
balanced = "required"
within_capacity = "required"
deterministic_root = "required"

[gate]
script = "scripts/run_multinode_federation_load_gate.sh"
report = "deployment/reports/multinode_federation_load_gate_run.md"
