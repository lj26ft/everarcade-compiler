<!doctype html><meta charset="utf-8"><title>Arena Vanguard Projection</title><h1>Arena Vanguard Projection</h1><p>Read-only client: load runtime/games/arena-vanguard/state.json and receipts.json. Rendering is non-authoritative.</p><canvas id="arena" width="480" height="320"></canvas><pre id="log"></pre><script>
async function draw(){const s=await fetch('../state.json').then(r=>r.json()).catch(()=>null); const c=document.getElementById('arena'),x=c.getContext('2d'); x.clearRect(0,0,480,320); x.strokeRect(20,20,440,280); if(!s){log.textContent='Run everarcade run-arena-local first.'; return} for (const p of Object.values(s.players)){x.fillStyle=p.connected?'#30c56b':'#777'; x.fillRect(240+p.x/2,160+p.y/2,18,18); x.fillText(`${p.id} hp=${p.health}`,240+p.x/2,155+p.y/2)} log.textContent=JSON.stringify(s.combat_events,null,2)} draw();</script>
