name: Deterministic World Factory

on:
  pull_request:
  push:
    branches:
      - main

env:
  CARGO_BUILD_JOBS: 1
  CARGO_NET_OFFLINE: "true"
  LC_ALL: C

jobs:
  deterministic-world-factory:
    name: World Factory gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
          components: rustfmt

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          package-manager-cache: false

      - name: Restore canonical offline vendor
        run: bash scripts/ensure_vendor_offline.sh

      - name: Verify vendor integrity metadata
        run: |
          test -f vendor.sha256
          test -f vendor-manifest.json
          bash scripts/verify_vendor_tree_hash.sh

      - name: Run deterministic world factory CI
        env:
          EVERARCADE_DETERMINISTIC_ATTEST: "1"
        run: bash scripts/ci/run-deterministic-world-factory.sh

      - name: Upload world factory evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: world-factory-evidence
          path: |
            examples/world-factory/frontier-settlement/out/
            dist/everarcade-world-factory-release.tar.gz
            reports/
          if-no-files-found: warn